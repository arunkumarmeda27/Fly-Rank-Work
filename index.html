<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Settings</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 50px;
            background-color: #f0f0f0;
        }
        .form-container {
            background-color: white;
            padding: 20px;
            border-radius: 5px;
            max-width: 400px;
            margin: auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
        }
        .form-group input[type="text"],
        .form-group input[type="email"],
        .form-group input[type="password"] {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
        .error {
            color: red;
            margin-bottom: 15px;
        }
        .success {
            color: green;
            margin-bottom: 15px;
        }
        button {
            padding: 10px 15px;
            background-color: blue;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Account Settings</h2>
    <div id="message"></div>
    <form id="settingsForm">
        <div class="form-group">
            <label>Name:</label>
            <input type="text" id="name">
        </div>
        <div class="form-group">
            <label>Email:</label>
            <input type="email" id="email">
        </div>
        <div class="form-group">
            <label>Password:</label>
            <input type="password" id="password">
        </div>
        <div class="form-group">
            <label>
                <input type="checkbox" id="notifications"> Enable Notifications
            </label>
        </div>
        <button type="submit">Save Settings</button>
    </form>
</div>

<script>
    document.getElementById('settingsForm').addEventListener('submit', function(e) {
        e.preventDefault();
        var name = document.getElementById('name').value;
        var email = document.getElementById('email').value;
        var password = document.getElementById('password').value;
        var messageDiv = document.getElementById('message');
        
        messageDiv.innerHTML = '';
        
        if (name === '' || email === '' || password === '') {
            messageDiv.innerHTML = '<div class="error">All fields are required!</div>';
            return;
        }
        
        if (email.indexOf('@') === -1) {
            messageDiv.innerHTML = '<div class="error">Invalid email address!</div>';
            return;
        }
        
        if (password.length < 8) {
            messageDiv.innerHTML = '<div class="error">Password must be at least 8 characters!</div>';
            return;
        }
        
        messageDiv.innerHTML = '<div class="success">Settings saved successfully!</div>';
    });
</script>

</body>
</html>
